services:
  postgres:
    image: postgres:17-alpine
    container_name: itoutcrm-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: itoutcrm-api
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: IT-outCRM
      Jwt__Audience: IT-outCRM-Users
      Jwt__ExpirationHours: "24"
      Cors__AllowedOrigins__0: http://it-out-crm.ru
      Cors__AllowedOrigins__1: https://it-out-crm.ru
      Cors__AllowedOrigins__2: http://www.it-out-crm.ru
    volumes:
      - api-uploads:/app/wwwroot/uploads
    networks:
      - crm-network
    depends_on:
      postgres:
        condition: service_healthy

  blazor:
    build:
      context: .
      dockerfile: Dockerfile.blazor
    container_name: itoutcrm-blazor
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ApiSettings__BaseUrl: http://api:8080
    networks:
      - crm-network
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: itoutcrm-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    networks:
      - crm-network
    depends_on:
      - blazor
      - api

  certbot:
    image: certbot/certbot
    container_name: itoutcrm-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot; done'"

volumes:
  postgres-data:
  api-uploads:
  certbot-etc:
  certbot-var:
  certbot-webroot:

networks:
  crm-network:
    driver: bridge
